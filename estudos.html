<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estudos Bíblicos — Embaixadores do Reino</title>
  <meta name="description" content="Estudos bíblicos temáticos sobre fé, oração, família, salvação, discipulado e vida cristã.">

  <div id="footer-container"></div>
  <script src="assets/js/componentes.js"></script>
